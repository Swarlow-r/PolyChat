<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PolyChat</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="app-container">
      <!-- 左栏：分组会话列表（改造为折叠树形） -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <h1 class="app-title">PolyChat</h1>
          <div class="sidebar-header-actions">
            <button type="button" id="btn-open-official-site" class="btn btn-small btn-official-site" title="访问官网">访问官网</button>
          </div>
        </div>

        <div class="sidebar-search" role="search">
          <input
            type="search"
            id="session-search-input"
            class="session-search-input"
            placeholder="搜索会话与消息…"
            enterkeyhint="search"
            autocomplete="off"
          />
          <div class="sidebar-search-actions">
            <button type="button" id="btn-session-search" class="btn btn-small btn-primary session-search-btn">搜索</button>
            <button type="button" id="btn-session-search-clear" class="btn btn-small btn-ghost session-search-clear" title="清除筛选" style="display: none">清除</button>
          </div>
        </div>

        <!-- 分组会话列表 -->
        <div id="session-list" class="session-list">
          <!-- 动态生成：
          <div class="site-group" data-site-id="doubao">
            <div class="site-group-header">
              <span class="site-group-toggle">▸</span>
              <span class="site-group-icon doubao"></span>
              <span class="site-group-name">豆包</span>
              <span class="site-group-count">3</span>
            </div>
            <div class="site-group-items" style="display:none;">
              <div class="session-item" data-id="conv_doubao_xxx">
                <div class="session-name">会话标题</div>
                <div class="session-meta">03-27 15:00</div>
                <span class="session-count">12条</span>
              </div>
            </div>
          </div>
          -->
        </div>

        <div class="sidebar-footer">
          <span id="storage-stats" class="storage-stats"></span>
        </div>
      </aside>

      <!-- 中栏：对话内容 -->
      <main class="chat-panel">
        <div class="chat-header">
          <div class="chat-header-info">
            <h2 id="current-session-title" class="session-title">选择一个标签查看对话</h2>
            <span id="current-session-site" class="session-site-badge"></span>
          </div>
          <div class="chat-header-actions">
            <button type="button" id="btn-toggle-compare" class="btn btn-small btn-ghost">开启对比</button>
            <button type="button" id="btn-pick-compare" class="btn btn-small btn-ghost" style="display:none;">选择对比会话</button>
            <button type="button" id="btn-select-mode" class="btn btn-small">选择内容进行总结</button>
            <button type="button" id="btn-session-manage" class="btn btn-small btn-ghost">会话管理</button>
          </div>
        </div>

        <!-- 选择模式工具栏 -->
        <div id="select-toolbar" class="select-toolbar" style="display:none;">
          <label class="select-all-label">
            <input type="checkbox" id="select-all-checkbox" />
            <span>全选</span>
          </label>
          <span id="selected-count" class="selected-count">已选 0 条</span>
          <div class="select-toolbar-actions">
            <button type="button" id="btn-cancel-select" class="btn btn-small btn-ghost">取消</button>
            <button type="button" id="btn-do-summary" class="btn btn-small btn-primary" disabled>总结</button>
          </div>
        </div>

        <!-- 会话管理模式工具栏 -->
        <div id="session-manage-toolbar" class="select-toolbar session-manage-toolbar" style="display:none;">
          <span id="session-manage-selected-count" class="selected-count">已选 0 个会话</span>
          <div class="select-toolbar-actions">
            <button type="button" id="btn-session-manage-cancel" class="btn btn-small btn-ghost">取消</button>
            <button type="button" id="btn-session-manage-delete" class="btn btn-small btn-danger" disabled>删除</button>
            <button type="button" id="btn-session-manage-export" class="btn btn-small btn-ghost">导出</button>
          </div>
        </div>

        <div id="chat-columns" class="chat-columns">
          <section class="chat-column chat-column-primary" data-panel-role="primary">
            <div id="chat-messages-primary" class="chat-messages">
              <p class="empty-hint">选择左侧标签查看对话内容</p>
            </div>
          </section>

          <section id="chat-column-compare" class="chat-column chat-column-compare" data-panel-role="compare" hidden>
            <div class="chat-column-header">
              <span id="compare-session-title" class="compare-session-title">未选择对比会话</span>
            </div>
            <div id="chat-messages-compare" class="chat-messages">
              <p class="empty-hint">点击“选择对比会话”查看另一个AI回答</p>
            </div>
          </section>
        </div>

        <!-- 底部：一键发送面板 -->
        <div class="send-panel">
          <div class="send-panel-row send-panel-prompt-block">
            <div id="send-target-hint" class="send-target-toast" role="status" aria-live="polite" hidden></div>
            <textarea id="prompt-input" class="textarea send-textarea" rows="2" placeholder="输入要发送给各模型的问题..."></textarea>
          </div>
          <div class="send-panel-row">
            <div class="send-panel-tabs">
              <button type="button" id="btn-toggle-selector" class="btn btn-small btn-ghost">
                AI Platform ▲
              </button>
              <div id="target-selector-panel" class="target-selector-panel" style="display:none;">
                <div class="selector-panel-header">
                  <label class="select-all-label">
                    <input type="checkbox" id="select-all-targets" />
                    <span>全选</span>
                  </label>
                </div>
                <div id="target-checkbox-list" class="target-checkbox-list">
                  <!-- 动态生成复选框列表 -->
                </div>
              </div>
            </div>
            <div id="selected-targets" class="selected-targets">
              <!-- 显示被勾选的AI标签 -->
            </div>
            <button
              type="button"
              id="btn-new-session"
              class="btn btn-small btn-ghost"
              disabled
              title="在已勾选且已打开各站的原标签内打开新会话入口，不切换当前浏览器焦点（地址与「打开」一致，可在设置中配置）"
            >
              一键新建会话
            </button>
            <button type="button" id="btn-send" class="btn btn-primary" disabled>发送</button>
          </div>
        </div>
      </main>
    </div>

    <!-- 会话「⋮」菜单：浮动在对应会话行右下方，避免内嵌撑开列表 -->
    <div id="session-menu-popover" class="session-menu-popover" hidden role="menu" aria-hidden="true">
      <button type="button" class="session-menu-item session-menu-rename" data-id="">重命名</button>
      <button type="button" class="session-menu-item session-menu-delete" data-id="">删除</button>
    </div>

    <div id="compare-picker-popover" class="compare-picker-popover" hidden aria-hidden="true">
      <div class="compare-picker-header">
        <input
          type="search"
          id="compare-picker-search"
          class="compare-picker-search"
          placeholder="搜索要对比的会话或AI…"
          autocomplete="off"
        />
      </div>
      <div id="compare-picker-list" class="compare-picker-list">
        <p class="empty-hint">暂无可对比会话</p>
      </div>
    </div>

    <script src="bundle.js"></script>
  </body>
</html>
